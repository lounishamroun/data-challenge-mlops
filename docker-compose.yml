services:

  # ──────────────────────────────────────────────
  # MinIO (S3-compatible object storage)
  # ──────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: mlflow-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio-init:
    image: minio/mc:latest
    container_name: mlflow-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until /usr/bin/mc alias set minio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}; do
          echo '...waiting...' && sleep 1
        done
        /usr/bin/mc mb minio/${MINIO_BUCKET} || true
        /usr/bin/mc anonymous set public minio/${MINIO_BUCKET} || true
        echo 'Bucket created successfully'

  # ──────────────────────────────────────────────
  # JupyterLab (notebooks dev)
  # ──────────────────────────────────────────────
  jupyterlab:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mlflow-jupyterlab
    ports:
      - "8888:8888"
      - "1235:1235"
    volumes:
      - .:/app
      - jupyter_data:/root/.jupyter
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
      MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL}
    depends_on:
      minio:
        condition: service_healthy

  # ──────────────────────────────────────────────
  # Airflow (orchestration / DAGs)
  # ──────────────────────────────────────────────
  airflow:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow
    ports:
      - "8081:8080"
    environment:
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
      MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    volumes:
      - ./airflow_dev/dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - airflow_data:/opt/airflow
    command: airflow standalone
    depends_on:
      minio:
        condition: service_healthy

  # ──────────────────────────────────────────────
  # FastAPI (prediction API)
  # ──────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: api
    ports:
      - "8000:8000"
    environment:
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
      MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    depends_on:
      minio:
        condition: service_healthy

  # ──────────────────────────────────────────────
  # Gradio (WebApp)
  # ──────────────────────────────────────────────
  webapp:
    build:
      context: .
      dockerfile: Dockerfile.webapp
    container_name: webapp
    ports:
      - "7860:7860"
    environment:
      API_URL: ${API_URL}
    depends_on:
      - api

volumes:
  minio_data:
  jupyter_data:
  airflow_data:
