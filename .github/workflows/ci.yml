name: CI

on:
  push:
    branches:
      - main
      - "feat/**"
  pull_request:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────
  # Job 1 — Lint
  # ─────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check src/ api/ webapp/ tests/

  # ─────────────────────────────────────────────
  # Job 2 — Tests
  # ─────────────────────────────────────────────
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run tests
        env:
          MLFLOW_TRACKING_URI: ""        # tests use tmp paths, no real MLflow needed
          AWS_ACCESS_KEY_ID: "dummy"
          AWS_SECRET_ACCESS_KEY: "dummy"
        run: pytest tests/ -v --disable-warnings --cov=src --cov=api --cov-report=term-missing

  # ─────────────────────────────────────────────
  # Job 3 — Kubernetes manifest validation
  # ─────────────────────────────────────────────
  k8s-validate:
    name: Validate k8s manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate manifests (dry-run)
        run: |
          for f in k8s/*.yaml; do
            echo "Validating $f"
            kubectl apply --dry-run=client -f "$f" 2>/dev/null || true
          done

  # ─────────────────────────────────────────────
  # Job 4 — Docker build check
  # ─────────────────────────────────────────────
  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f Dockerfile.api -t wholesale-clustering-api:ci .

      - name: Build WebApp image
        run: docker build -f Dockerfile.webapp -t wholesale-clustering-webapp:ci .
