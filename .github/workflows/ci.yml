name: CI

on:
  push:
    branches:
      - main
      - "feat/**"
  pull_request:
    branches:
      - main

jobs:
  # ── Job 1 — Lint ─────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer ruff
        run: pip install ruff

      - name: Vérifier le style du code
        run: ruff check src/ api/ webapp/ tests/

  # ── Job 2 — Tests ────────────────────────────
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer uv
        run: pip install uv

      - name: Installer les dépendances
        run: uv pip install --system -e ".[dev]"

      - name: Lancer les tests
        env:
          MLFLOW_TRACKING_URI: ""        # les tests utilisent des chemins temporaires
          AWS_ACCESS_KEY_ID: "dummy"
          AWS_SECRET_ACCESS_KEY: "dummy"
        run: pytest tests/ -v --disable-warnings --cov=src --cov=api --cov-report=term-missing

  # ── Job 3 — Validation des manifestes k8s ────
  k8s-validate:
    name: Validation k8s
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Valider les manifestes (dry-run)
        run: |
          for f in k8s/*.yaml; do
            echo "Validation de $f"
            kubectl apply --dry-run=client -f "$f" 2>/dev/null || true
          done

  # ── Job 4 — Build des images Docker ──────────
  docker-build:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build image API
        run: docker build -f Dockerfile.api -t wholesale-clustering-api:ci .

      - name: Build image WebApp
        run: docker build -f Dockerfile.webapp -t wholesale-clustering-webapp:ci .
