apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: wholesale-mlops
  labels:
    app: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: wholesale-clustering-api:latest
          imagePullPolicy: Never          # local image (Minikube / Docker Desktop)
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: mlops-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
