# ClusterIP : accessible uniquement au sein du cluster.
# Le pod WebApp atteint l'API via http://api-service:8000
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: wholesale-mlops
spec:
  selector:
    app: api
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
