# Copy this file to secrets.yaml, fill in base64-encoded values, and apply:
#   kubectl apply -f k8s/secrets.yaml -n wholesale-mlops
#
# Encode a value:  echo -n "my-value" | base64

apiVersion: v1
kind: Secret
metadata:
  name: mlops-secrets
  namespace: wholesale-mlops
type: Opaque
data:
  MLFLOW_TRACKING_URI: <base64-encoded>        # e.g. http://mlflow:5000
  MLFLOW_S3_ENDPOINT_URL: <base64-encoded>     # e.g. http://minio:9000
  AWS_ACCESS_KEY_ID: <base64-encoded>          # MinIO root user
  AWS_SECRET_ACCESS_KEY: <base64-encoded>      # MinIO root password
  API_URL: <base64-encoded>                    # e.g. http://api-service:8000
